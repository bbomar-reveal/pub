---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: root-ca
  namespace: cert-manager
spec:
  isCA: true
  duration: 87600h
  renewBefore: 720h
  commonName: local-root-ca
  secretName: root-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256

  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer
spec:
  ca:
    secretName: root-ca-secret
---
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: localcerts
spec:
    sources:
    - useDefaultCAs: true
    - secret:
        name: "root-ca-secret"
        key: "ca.crt"
    target:
        configMap:
          key: "bundle.pem"
        namespaceSelector:
          matchLabels:
              kubernetes.io/metadata.name: "*"