apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: baseappset
  namespace: argocd
spec:
  goTemplate: true
  generators:
  - git:
      repoURL: https://github.com/bbomar-reveal/pub.git
      revision: HEAD
      directories:
      - path: base/autoinstall/*/helm
  template:
    metadata:
      name: '{{ $segs := .path.segments }}{{ index $segs (sub (len $segs) 2) }}'
    spec:
      project: default
      destination:
        namespace: '{{ $segs := .path.segments }}{{ index $segs (sub (len $segs) 2) }}'
        server: https://kubernetes.default.svc
      source:
        repoURL: https://github.com/bbomar-reveal/pub.git
        targetRevision: HEAD
        path: '{{.path.path}}'
        helm:
          parameters:
            - name: domainName
              value: "cluster3"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m